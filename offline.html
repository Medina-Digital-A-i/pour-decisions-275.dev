<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Offline — Pour Decisions</title>
<meta name="theme-color" content="#1F4860" />
<link rel="icon" href="assets/favicon.ico" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: linear-gradient(135deg, #1F4860 0%, #3D6E85 50%, #4A7C2E 100%);
    color: #FFF8EC;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  body { display: grid; place-items: center; padding: 24px; text-align: center; }
  .logo {
    width: 96px; height: 96px;
    background: #FFF8EC; color: #1F4860;
    border-radius: 26px; display: grid; place-items: center;
    font-family: Georgia, serif; font-weight: 700; font-size: 56px;
    margin: 0 auto 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  }
  h1 { font-family: Georgia, serif; font-size: 32px; margin-bottom: 12px; }
  p { font-size: 15px; line-height: 1.6; opacity: 0.9; max-width: 320px; margin: 0 auto 24px; }
  button {
    background: #E8B547; color: #14252E;
    border: none; padding: 14px 32px;
    border-radius: 999px; font-weight: 700; font-size: 15px;
    cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  button:active { transform: scale(0.97); }
  .pin { margin-top: 32px; font-size: 11px; opacity: 0.6; letter-spacing: 0.18em; text-transform: uppercase; }
</style>
</head>
<body>
  <div>
    <div class="logo">P</div>
    <h1>You're offline</h1>
    <p>No signal, no problem. Your menu and Pour Pass are still cached — pop back online and we'll sync the rest.</p>
    <button onclick="location.reload()">Try again</button>
    <div class="pin">Pour Decisions · Albany NY</div>
  </div>
</body>
</html>
